name: Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            cat > android/key.properties << EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          fi

      - name: Build APK
        run: flutter build apk --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }}

      - name: Build AAB
        if: vars.GOOGLE_PLAY_UPLOAD_ENABLED == 'true'
        run: flutter build appbundle --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }}

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties

      - name: Copy APK for upload
        run: cp build/app/outputs/flutter-apk/app-release.apk finzy-android.apk

      - name: Attest APK
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: finzy-android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: finzy-android.apk

      - name: Upload AAB
        if: vars.GOOGLE_PLAY_UPLOAD_ENABLED == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-26
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', 'ios/**/*.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Import Code Signing Certificate
        id: import-cert
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" ]; then
            KEYCHAIN_PATH=$RUNNER_TEMP/ios-build.keychain
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            CERTIFICATE_PATH=$RUNNER_TEMP/ios-certificate.p12
            echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            security list-keychains -d user -s $KEYCHAIN_PATH login.keychain
            echo "imported=true" >> $GITHUB_OUTPUT
          else
            echo "imported=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Provisioning Profile
        if: steps.import-cert.outputs.imported == 'true'
        id: install-profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/finzy_distribution.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          security cms -D -i "$PP_PATH" > $RUNNER_TEMP/pp_decoded.plist
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/pp_decoded.plist)
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" $RUNNER_TEMP/pp_decoded.plist)
          echo "Installing profile: $PP_NAME (UUID: $PP_UUID)"
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "pp_uuid=$PP_UUID" >> $GITHUB_OUTPUT

      - name: Verify signing setup
        if: steps.import-cert.outputs.imported == 'true'
        run: |
          echo "=== Installed Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo ""
          echo "=== Available Signing Identities ==="
          security find-identity -v -p codesigning
          echo ""
          echo "=== Keychain Search List ==="
          security list-keychains -d user

      - name: Configure Runner for manual signing
        if: steps.import-cert.outputs.imported == 'true'
        run: |
          PROJECT="ios/Runner.xcodeproj/project.pbxproj"

          # Add manual signing settings to all Runner build configurations
          perl -i -pe 's/(DEVELOPMENT_TEAM = MTQC4MRP5R;)/$1\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "Finzy App Store Distribution";/' "$PROJECT"

          echo "=== Verifying project signing settings ==="
          grep -A3 'CODE_SIGN_STYLE' "$PROJECT" || echo "No CODE_SIGN_STYLE found"

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed IPA
        if: steps.import-cert.outputs.imported == 'true'
        run: |
          for i in 1 2 3 4 5; do
            echo "Build attempt $i of 5"
            flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }} && break
            if [ $i -eq 5 ]; then exit 1; fi
            echo "Build failed (often transient SPM download), retrying in 120 seconds..."
            sleep 120
          done

      - name: Build unsigned IPA (fallback)
        if: steps.import-cert.outputs.imported != 'true'
        run: |
          for i in 1 2 3 4 5; do
            echo "Build attempt $i of 5"
            flutter build ios --release --no-codesign --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }} && break
            if [ $i -eq 5 ]; then exit 1; fi
            echo "Build failed (often transient SPM download), retrying in 120 seconds..."
            sleep 120
          done
          mkdir -p build/ios/ipa Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r build/ios/ipa/finzy.ipa Payload

      - name: Rename IPA for artifact upload
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          cp "$IPA_PATH" finzy-ios.ipa

      - name: Attest IPA
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: finzy-ios.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v5
        with:
          name: ios-ipa
          path: finzy-ios.ipa

      - name: Clean up signing artifacts
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/ios-build.keychain
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          rm -f $RUNNER_TEMP/ios-certificate.p12
          rm -f $RUNNER_TEMP/finzy_distribution.mobileprovision
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
          rm -rf ~/.appstoreconnect

  build-macos:
    runs-on: macos-26
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            macos/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-macos-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-macos-pods-

      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-macos-spm-${{ hashFiles('**/Package.resolved', 'macos/**/*.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-macos-spm-

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: |
          for i in 1 2 3 4 5; do
            echo "Build attempt $i of 5"
            flutter build macos --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }} && break
            if [ $i -eq 5 ]; then exit 1; fi
            echo "Build failed (often transient SPM download), retrying in 120 seconds..."
            sleep 120
          done

      - name: Import Code Signing Certificate
        id: import-cert
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$MACOS_CERTIFICATE_BASE64" ]; then
            # Create temporary keychain
            KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # Import certificate to keychain
            CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
            echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # Add keychain to search list
            security list-keychains -d user -s $KEYCHAIN_PATH login.keychain
            echo "imported=true" >> $GITHUB_OUTPUT
          else
            echo "imported=false" >> $GITHUB_OUTPUT
          fi

      - name: Sign Application
        if: steps.import-cert.outputs.imported == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Find the identity
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | grep -o '".*"' | tr -d '"')
          echo "Signing with identity: $IDENTITY"

          APP_PATH="build/macos/Build/Products/Release/Finzy.app"

          # Sign all frameworks and dylibs first (inside-out signing)
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -o -name "*.dylib" | while read framework; do
            echo "Signing: $framework"
            codesign --force --sign "$IDENTITY" --timestamp --options runtime "$framework"
          done

          # Sign the app bundle itself
          echo "Signing app bundle: $APP_PATH"
          codesign --force --sign "$IDENTITY" --timestamp --options runtime --entitlements macos/Runner/Release.entitlements "$APP_PATH"

      - name: Verify Signature
        if: steps.import-cert.outputs.imported == 'true'
        run: |
          APP_PATH="build/macos/Build/Products/Release/Finzy.app"
          echo "Verifying signature..."
          codesign -dvvv "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize Application
        if: steps.import-cert.outputs.imported == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/Finzy.app"

          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_P8" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          echo "Creating ZIP for notarization..."
          ditto -c -k --keepParent "$APP_PATH" notarization.zip

          echo "Submitting to Apple's notary service..."
          xcrun notarytool submit notarization.zip \
            --key ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --wait --timeout 30m

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"

          echo "Verifying notarization..."
          xcrun stapler validate "$APP_PATH"

      - name: Clean up API key
        if: always()
        run: rm -rf ~/.appstoreconnect

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/macos/Build/Products/Release/Finzy.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -format ULMO -srcfolder dmg-staging -volname "Finzy" finzy-macos.dmg

      - name: Attest macOS DMG
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: finzy-macos.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: finzy-macos.dmg

  build-windows-x64:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }}

      - name: Upload x64 build
        uses: actions/upload-artifact@v5
        with:
          name: windows-x64-build
          path: build/windows/x64/runner/Release/

  build-windows-arm64:
    runs-on: windows-11-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # Flutter master ships engine source files whose paths exceed Windows' 260-char
      # default, breaking the clone done by flutter-action below. Enable long paths first.
      - name: Enable git long paths
        run: git config --system core.longpaths true
        shell: pwsh

      # ARM64 is not on the stable Flutter channel yet, so this job has to use master.
      # Within master, Windows touchscreen (digitizer) input on ARM64 was regressed by
      # flutter/flutter#165323 ("Allow stylus support on windows", commit 904dab858c,
      # merged 2026-03-04) — reported upstream at flutter/flutter#184954, not yet fixed.
      # 7b7832a30f is the last verified-good revision (the immediate parent of #165323),
      # confirmed via git bisect against a real Windows ARM64 touchscreen.
      # When the upstream fix lands (or stable picks up ARM64), drop the pin / move to stable.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "master"
          flutter-version: "7b7832a30f"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-arm64-pub-flutter-7b7832a30f-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-arm64-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows arm64
        run: flutter build windows --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }}

      - name: Upload arm64 build
        uses: actions/upload-artifact@v5
        with:
          name: windows-arm64-build
          path: build/windows/arm64/runner/Release/

  package-windows:
    needs: [build-windows-x64, build-windows-arm64]
    runs-on: windows-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Download x64 build
        uses: actions/download-artifact@v5
        with:
          name: windows-x64-build
          path: build-x64

      - name: Download arm64 build
        uses: actions/download-artifact@v5
        with:
          name: windows-arm64-build
          path: build-arm64

      - name: Build installer and portables
        run: .\windows\build-installer.ps1 -X64BuildDir "build-x64" -Arm64BuildDir "build-arm64"

      - name: Setup Flutter for MSIX
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies for MSIX
        run: flutter pub get

      - name: Create MSIX build structure
        run: |
          New-Item -ItemType Directory -Path "build\windows\x64\runner\Release" -Force
          New-Item -ItemType Directory -Path "build\windows\arm64\runner\Release" -Force
          Copy-Item -Path "build-x64\*" -Destination "build\windows\x64\runner\Release\" -Recurse
          Copy-Item -Path "build-arm64\*" -Destination "build\windows\arm64\runner\Release\" -Recurse
          # msix package expects arm64 at build/windows/arm64/arm64/runner/Release when
          # buildFilesFolderStart includes architecture (e.g. from x64 msix output path)
          New-Item -ItemType Directory -Path "build\windows\arm64\arm64\runner\Release" -Force
          Copy-Item -Path "build-arm64\*" -Destination "build\windows\arm64\arm64\runner\Release\" -Recurse

      - name: Build MSIX x64
        env:
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
        run: |
          if (-not $env:MSIX_PUBLISHER) {
            Write-Error "MSIX_PUBLISHER secret is required for MSIX build. Set it in Partner Center > Product identity > Publisher (format: CN=GUID)."
          }
          dart run msix:create --build-windows false --architecture x64 -n finzy-windows-x64 -o . --publisher $env:MSIX_PUBLISHER

      - name: Build MSIX arm64
        env:
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
        run: |
          if (-not $env:MSIX_PUBLISHER) {
            Write-Error "MSIX_PUBLISHER secret is required for MSIX build. Set it in Partner Center > Product identity > Publisher (format: CN=GUID)."
          }
          dart run msix:create --build-windows false --architecture arm64 -n finzy-windows-arm64 -o . --publisher $env:MSIX_PUBLISHER

      - name: Attest Windows artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            finzy-windows-x64-portable.zip
            finzy-windows-arm64-portable.zip
            finzy-windows-installer.exe

      - name: Attest Windows MSIX
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            finzy-windows-x64.msix
            finzy-windows-arm64.msix

      - name: Upload x64 portable
        uses: actions/upload-artifact@v5
        with:
          name: windows-x64-portable
          path: finzy-windows-x64-portable.zip

      - name: Upload arm64 portable
        uses: actions/upload-artifact@v5
        with:
          name: windows-arm64-portable
          path: finzy-windows-arm64-portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: finzy-windows-installer.exe

      - name: Upload MSIX
        uses: actions/upload-artifact@v5
        with:
          name: windows-msix
          path: |
            finzy-windows-x64.msix
            finzy-windows-arm64.msix

  build-linux-x64:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: clang cmake meson ninja-build pkg-config nasm libgtk-3-dev libevdev-dev liblzma-dev libstdc++-12-dev libasound2-dev libass-dev libfreetype-dev libfontconfig-dev libfribidi-dev libharfbuzz-dev libepoxy-dev libegl-dev libgl-dev libgnutls28-dev libpipewire-0.3-dev libva-dev libvdpau-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev libxpresent-dev libxkbcommon-dev libpulse-dev libdbus-1-dev libdrm-dev libgbm-dev libwayland-dev wayland-protocols liblcms2-dev ruby ruby-dev rubygems build-essential rpm libarchive-tools imagemagick
          version: 1.1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake meson ninja-build pkg-config nasm libgtk-3-dev libevdev-dev liblzma-dev libstdc++-12-dev libasound2-dev libass-dev libfreetype-dev libfontconfig-dev libfribidi-dev libharfbuzz-dev libepoxy-dev libegl-dev libgl-dev libgnutls28-dev libpipewire-0.3-dev libva-dev libvdpau-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev libxpresent-dev libxkbcommon-dev libpulse-dev libdbus-1-dev libdrm-dev libgbm-dev libwayland-dev wayland-protocols liblcms2-dev ruby ruby-dev rubygems build-essential rpm libarchive-tools imagemagick

      - name: Cache libmpv build
        id: libmpv-cache
        uses: actions/cache@v5
        with:
          path: libmpv-prefix
          key: libmpv-${{ runner.arch }}-${{ hashFiles('linux/packaging/build-libmpv.sh') }}

      - name: Build libmpv
        if: steps.libmpv-cache.outputs.cache-hit != 'true'
        run: bash linux/packaging/build-libmpv.sh

      - name: Install fpm
        run: sudo gem install fpm

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux x64
        run: flutter build linux --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }}
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/libmpv-prefix/lib/pkgconfig:${{ github.workspace }}/libmpv-prefix/lib/x86_64-linux-gnu/pkgconfig

      - name: Build Linux Packages
        run: ARCH_SUFFIX=x64 OUTPUT_DIR=$GITHUB_WORKSPACE python3 linux/packaging/build-packages.py

      - name: Copy libmpv into bundle
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          LIBMPV_DIR=$(dirname "$(find libmpv-prefix -name 'libmpv.so' | head -1)")
          cp -a "$LIBMPV_DIR"/libmpv.so* "$BUNDLE_LIB/"
          cp -a libmpv-prefix/lib/libshaderc_shared.so* "$BUNDLE_LIB/"

      - name: Bundle shared libraries for portable tarball
        run: bash linux/packaging/bundle-libs.sh build/linux/x64/release/bundle

      - name: Copy wrapper script into bundle
        run: cp linux/packaging/finzy.sh build/linux/x64/release/bundle/finzy.sh

      - name: Verify no missing dependencies
        run: |
          cd build/linux/x64/release/bundle
          MISSING=$(LD_LIBRARY_PATH=lib ldd ./finzy 2>&1 | grep "not found" || true)
          if [[ -n "$MISSING" ]]; then
            echo "ERROR: Unresolved dependencies found:" >&2
            echo "$MISSING" >&2
            exit 1
          fi
          echo "All dependencies resolved."

      - name: Create tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf $GITHUB_WORKSPACE/finzy-linux-x64.tar.gz *

      - name: Attest Linux x64 artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            finzy-linux-x64.tar.gz
            finzy-linux-x64.deb
            finzy-linux-x64.rpm
            finzy-linux-x64.pkg.tar.zst

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-x64
          path: |
            finzy-linux-x64.tar.gz
            finzy-linux-x64.deb
            finzy-linux-x64.rpm
            finzy-linux-x64.pkg.tar.zst

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # Same pin as build-windows-arm64. ARM64 isn't on stable yet, and the Windows
      # touchscreen regression from flutter/flutter#165323 (commit 904dab858c) was confirmed
      # via bisect against Windows ARM64 hardware (flutter/flutter#184954). Linux ARM64 hasn't
      # been independently bisected for the same regression, so we conservatively share the pin.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "master"
          flutter-version: "7b7832a30f"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-arm64-pub-flutter-7b7832a30f-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-arm64-pub-

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: clang cmake meson ninja-build pkg-config nasm libgtk-3-dev libevdev-dev liblzma-dev libstdc++-12-dev libasound2-dev libass-dev libfreetype-dev libfontconfig-dev libfribidi-dev libharfbuzz-dev libepoxy-dev libegl-dev libgl-dev libgnutls28-dev libpipewire-0.3-dev libva-dev libvdpau-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev libxpresent-dev libxkbcommon-dev libpulse-dev libdbus-1-dev libdrm-dev libgbm-dev libwayland-dev wayland-protocols liblcms2-dev ruby ruby-dev rubygems build-essential rpm libarchive-tools imagemagick
          version: 1.1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake meson ninja-build pkg-config nasm libgtk-3-dev libevdev-dev liblzma-dev libstdc++-12-dev libasound2-dev libass-dev libfreetype-dev libfontconfig-dev libfribidi-dev libharfbuzz-dev libepoxy-dev libegl-dev libgl-dev libgnutls28-dev libpipewire-0.3-dev libva-dev libvdpau-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev libxpresent-dev libxkbcommon-dev libpulse-dev libdbus-1-dev libdrm-dev libgbm-dev libwayland-dev wayland-protocols liblcms2-dev ruby ruby-dev rubygems build-essential rpm libarchive-tools imagemagick

      - name: Cache libmpv build
        id: libmpv-cache
        uses: actions/cache@v5
        with:
          path: libmpv-prefix
          key: libmpv-${{ runner.arch }}-${{ hashFiles('linux/packaging/build-libmpv.sh') }}

      - name: Build libmpv
        if: steps.libmpv-cache.outputs.cache-hit != 'true'
        run: bash linux/packaging/build-libmpv.sh

      - name: Install fpm
        run: sudo gem install fpm

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux arm64
        run: flutter build linux --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }}
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/libmpv-prefix/lib/pkgconfig:${{ github.workspace }}/libmpv-prefix/lib/aarch64-linux-gnu/pkgconfig

      - name: Find bundle directory
        id: find-bundle
        run: |
          BUNDLE_DIR=$(find build/linux -path "*/release/bundle" -type d | head -1)
          echo "bundle_dir=$BUNDLE_DIR" >> $GITHUB_OUTPUT

      - name: Build Linux Packages
        run: |
          BUILD_DIR=${{ steps.find-bundle.outputs.bundle_dir }} \
          ARCH_SUFFIX=arm64 \
          OUTPUT_DIR=$GITHUB_WORKSPACE \
          python3 linux/packaging/build-packages.py

      - name: Copy libmpv into bundle
        run: |
          BUNDLE_LIB=${{ steps.find-bundle.outputs.bundle_dir }}/lib
          LIBMPV_DIR=$(dirname "$(find libmpv-prefix -name 'libmpv.so' | head -1)")
          cp -a "$LIBMPV_DIR"/libmpv.so* "$BUNDLE_LIB/"
          cp -a libmpv-prefix/lib/libshaderc_shared.so* "$BUNDLE_LIB/"

      - name: Bundle shared libraries for portable tarball
        run: bash linux/packaging/bundle-libs.sh ${{ steps.find-bundle.outputs.bundle_dir }}

      - name: Copy wrapper script into bundle
        run: cp linux/packaging/finzy.sh ${{ steps.find-bundle.outputs.bundle_dir }}/finzy.sh

      - name: Verify no missing dependencies
        run: |
          cd ${{ steps.find-bundle.outputs.bundle_dir }}
          MISSING=$(LD_LIBRARY_PATH=lib ldd ./finzy 2>&1 | grep "not found" || true)
          if [[ -n "$MISSING" ]]; then
            echo "ERROR: Unresolved dependencies found:" >&2
            echo "$MISSING" >&2
            exit 1
          fi
          echo "All dependencies resolved."

      - name: Create tarball
        run: |
          cd ${{ steps.find-bundle.outputs.bundle_dir }}
          tar -czf $GITHUB_WORKSPACE/finzy-linux-arm64.tar.gz *

      - name: Attest Linux arm64 artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            finzy-linux-arm64.tar.gz
            finzy-linux-arm64.deb
            finzy-linux-arm64.rpm
            finzy-linux-arm64.pkg.tar.zst

      - name: Upload Linux arm64 artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-arm64
          path: |
            finzy-linux-arm64.tar.gz
            finzy-linux-arm64.deb
            finzy-linux-arm64.rpm
            finzy-linux-arm64.pkg.tar.zst

  build-web:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set GIT_COMMIT
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --dart-define=GIT_COMMIT=${{ env.GIT_COMMIT }}

      - name: Attest Web build
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: build/web/

      - name: Upload Web build
        uses: actions/upload-artifact@v5
        with:
          name: web-build
          path: build/web/

  create-release:
    needs: [build-android, build-ios, build-macos, package-windows, build-linux-x64, build-linux-arm64, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release files list
        id: release-files
        run: |
          {
            echo "artifacts/android-apk/finzy-android.apk"
            [ -f "artifacts/android-aab/app-release.aab" ] && echo "artifacts/android-aab/app-release.aab"
            echo "artifacts/ios-ipa/finzy-ios.ipa"
            echo "artifacts/macos-dmg/finzy-macos.dmg"
            echo "artifacts/windows-x64-portable/finzy-windows-x64-portable.zip"
            echo "artifacts/windows-arm64-portable/finzy-windows-arm64-portable.zip"
            echo "artifacts/windows-installer/finzy-windows-installer.exe"
            if [ -d "artifacts/windows-msix" ]; then
              echo "artifacts/windows-msix/finzy-windows-x64.msix"
              echo "artifacts/windows-msix/finzy-windows-arm64.msix"
            fi
            echo "artifacts/linux-x64/*"
            echo "artifacts/linux-arm64/*"
          } > release-files.txt
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          cat release-files.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete existing release assets
        continue-on-error: true
        run: |
          TAG="${{ github.ref_name }}"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            for ASSET in $(gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --jq '.[].id'); do
              gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ASSET
            done
            echo "Deleted existing assets from release $TAG"
          else
            echo "No existing release for tag $TAG, skipping asset cleanup"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.release-files.outputs.paths }}
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
