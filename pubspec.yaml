name: finzy
description: "A beautiful Jellyfin client"
publish_to: "none"
version: 0.4.2+17

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  dio: ^5.4.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  window_manager: ^0.5.1
  logger: ^2.0.2
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  provider: ^6.1.2
  flex_color_picker: ^3.6.0
  qr_flutter: ^4.1.0
  slang: ^4.12.0
  slang_flutter: ^4.12.0
  duration: ^4.0.3
  connectivity_plus: ^7.0.0
  os_media_controls:
    git:
      url: https://github.com/dkmcgowan/media_controls
      ref: 5a7cc77
  rate_limiter: ^1.0.0
  wakelock_plus:
    git:
      url: https://github.com/dkmcgowan/wakelock_plus
      path: wakelock_plus
  path_provider: ^2.1.0
  path: ^1.9.0
  universal_gamepad: ^1.4.4
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.41
  workmanager: ^0.9.0+3
  crypto: ^3.0.7
  file_picker: ^10.3.10
  saf_util: ^0.11.0
  saf_stream: ^0.12.2
  material_symbols_icons: ^4.2928.1

  in_app_review: ^2.0.11
  store_checker: ^1.8.0

  flutter_svg: ^2.2.3
  mobile_scanner: ^6.0.2
  android_intent_plus: ^5.0.2
  background_downloader: ^9.5.2
  sqlite3_web: ^0.4.1
  web: ^1.1.0
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.13
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4
  slang_build_runner: ^4.12.0
  dart_code_linter: ^3.2.1
  drift_dev: ^2.14.0

dependency_overrides:
  # Fix build_runner: source_gen 3.x uses getInvocation() removed in analyzer 8+.
  # Force source_gen 4.x which is compatible with analyzer 8.x.
  source_gen: ^4.1.2

flutter:
  uses-material-design: true
  assets:
    - lib/data/iso_639_codes.json
    - assets/finzy.png
    - assets/go-noto-current-regular.ttf
    - assets/shaders/nvscaler/
    - assets/shaders/anime4k/
    - assets/player_icons/
    - assets/rating_icons/

msix_config:
  display_name: Finzy for Jellyfin
  publisher_display_name: dkmcgowan
  # Publisher is provided by MSIX_PUBLISHER secret in CI. For local dev only:
  # Get from Partner Center > Product identity > Publisher (format: CN=GUID)
  publisher: CN=placeholder
  identity_name: DavidMcGowan.FinzyforJellyfin
  logo_path: assets/finzy.png
  store: true
  capabilities: internetClient, privateNetworkClientServer

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/finzy.png"
  adaptive_icon_background: "#1A1F2E"
  adaptive_icon_foreground: "assets/finzy_android_foreground.png"
  adaptive_icon_foreground_inset: 0
  adaptive_icon_monochrome: "assets/finzy_monochrome.png"
  macos:
    generate: false
  windows:
    generate: true
  linux:
    generate: true
