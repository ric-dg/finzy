<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Finzy – Jellyfin client for movies, TV shows, and music.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finzy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- PWA -->
  <meta name="theme-color" content="#1A1F2E">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Finzy</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Register custom service worker for offline caching -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service_worker.js');
      });
    }

    // PWA install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
    });

    // Called from Flutter via JS interop to trigger the install prompt.
    // Returns true if the user accepted, false otherwise.
    window.installPwa = function() {
      if (!window.deferredPrompt) return Promise.resolve(false);
      const prompt = window.deferredPrompt;
      window.deferredPrompt = null;
      return prompt.prompt().then(function(result) {
        return result.outcome === 'accepted';
      }).catch(function() {
        return false;
      });
    };

    // Check if the PWA install prompt is available
    window.isPwaInstallable = function() {
      return window.deferredPrompt != null;
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
